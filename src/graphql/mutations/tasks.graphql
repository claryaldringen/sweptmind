mutation CreateTask($input: CreateTaskInput!) {
  createTask(input: $input) {
    id
    listId
    title
    notes
    isCompleted
    dueDate
    dueDateEnd
    sortOrder
    createdAt
    steps {
      id
      taskId
      title
      isCompleted
      sortOrder
    }
  }
}

mutation UpdateTask($id: String!, $input: UpdateTaskInput!) {
  updateTask(id: $id, input: $input) {
    id
    title
    notes
    dueDate
    dueDateEnd
    reminderAt
    recurrence
    deviceContext
    listId
    forceCalendarSync
  }
}

mutation DeleteTask($id: String!) {
  deleteTask(id: $id)
}

mutation ToggleTaskCompleted($id: String!) {
  toggleTaskCompleted(id: $id) {
    id
    isCompleted
    completedAt
  }
}

mutation ReorderTasks($input: [ReorderTaskInput!]!) {
  reorderTasks(input: $input)
}

mutation ImportTasks($input: [ImportTaskInput!]!) {
  importTasks(input: $input) {
    importedCount
    createdLists
  }
}

mutation CloneTask($id: String!) {
  cloneTask(id: $id) {
    id
    listId
    title
    notes
    isCompleted
    dueDate
    dueDateEnd
    sortOrder
    createdAt
    forceCalendarSync
  }
}
