mutation RegisterAttachment(
  $taskId: String!
  $fileName: String!
  $fileSize: Int!
  $mimeType: String!
  $blobUrl: String!
) {
  registerAttachment(
    taskId: $taskId
    fileName: $fileName
    fileSize: $fileSize
    mimeType: $mimeType
    blobUrl: $blobUrl
  ) {
    id
    taskId
    fileName
    fileSize
    mimeType
    createdAt
  }
}

mutation DeleteAttachment($id: String!) {
  deleteAttachment(id: $id)
}

query AttachmentDownloadUrl($id: String!) {
  attachmentDownloadUrl(id: $id)
}
