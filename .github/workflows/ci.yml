name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: corepack enable && yarn install --immutable
      - run: yarn lint
      - run: yarn format:check
      - run: yarn typecheck
      - run: yarn test
      - run: yarn codegen
      - name: Check for uncommitted GraphQL codegen changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::GraphQL codegen produced uncommitted changes. Run 'yarn codegen' and commit the results."
            git diff --name-only
            exit 1
          fi
      - name: Build
        run: yarn build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "ci-placeholder-secret-that-is-at-least-32-chars"
